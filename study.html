<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Thai Study</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thai Study">
<meta name="theme-color" content="#1a1208">
<meta name="description" content="Thai vocabulary flashcards, grammar rules, and pronunciation guide">
<link rel="manifest" id="manifest-placeholder">
<link rel="apple-touch-icon" id="apple-touch-icon">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --ink: #1a1208;
    --ink-muted: #6b5f4a;
    --ink-faint: #b8a98a;
    --accent: #c84b2f;
    --accent-light: #f5e8e4;
    --border: #e0d5c0;
    --card-back: #1a1208;
    --card-back-text: #fffdf8;
    --card-back-muted: #b8a98a;
    --shadow: 4px 6px 0px #c0b090;
  }

  [data-theme="dark"] {
    --bg: #16120e;
    --surface: #1e1812;
    --ink: #f0e8d8;
    --ink-muted: #a89880;
    --ink-faint: #6a5c48;
    --accent: #e8603a;
    --accent-light: #2a1a12;
    --border: #2e2418;
    --card-back: #f0e8d8;
    --card-back-text: #16120e;
    --card-back-muted: #6a5c48;
    --shadow: 4px 6px 0px #0a0806;
  }

  /* theme toggle button */
  .theme-toggle {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    transition: background 0.2s, transform 0.15s;
    z-index: 500;
  }
  .theme-toggle:hover { transform: scale(1.1); }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── nav ── */
  nav {
    background: var(--ink);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-row1 {
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--surface);
    padding: 0.75rem 1rem 0.75rem 0;
    border-right: 1px solid rgba(255,255,255,0.15);
    margin-right: 0.5rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-brand span { color: #e8a87c; font-style: italic; }

  .nav-groups {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .nav-group-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.75rem 1rem;
    border-bottom: 2.5px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-group-btn:hover { color: rgba(255,255,255,0.85); }
  .nav-group-btn.active { color: #fff; border-bottom-color: #e8a87c; }

  .nav-row2 {
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    background: rgba(0,0,0,0.18);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-row2::-webkit-scrollbar { display: none; }

  .nav-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.6rem 0.9rem;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-btn:hover { color: rgba(255,255,255,0.85); }
  .nav-btn.active { color: #fff; border-bottom-color: #e8a87c; }
  .nav-btn.hidden { display: none; }
  /* mobile-only items — hidden on desktop, shown inside hamburger on mobile */
  .nav-btn.mobile-visible { display: none; }
  .nav-group-divider { display: none; }

  /* mobile: collapse row1 groups behind hamburger, row2 stays */
  .nav-hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.75rem 0 0.75rem 0.75rem;
    margin-left: auto;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: rgba(255,255,255,0.8);
    transition: all 0.2s;
    border-radius: 1px;
  }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 600px) {
    .nav-hamburger { display: flex; }

    /* hide the row2 sub-tabs entirely on mobile — all nav is in hamburger */
    .nav-row2 { display: none; }

    /* group buttons in row1 also hidden — they move into hamburger */
    .nav-groups {
      display: none;
      flex-direction: column;
      align-items: stretch;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.12);
      z-index: 200;
      padding: 0.5rem 0 0.75rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .nav-groups.open { display: flex; }
    .nav-groups.open .nav-btn.mobile-visible { display: block; }
    .nav-groups.open .nav-group-divider {
      display: block;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0.4rem 0;
    }

    /* section label (Study / Reference) */
    .nav-group-btn {
      padding: 0.6rem 1.25rem 0.35rem;
      border: none;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38);
      cursor: default;
      pointer-events: none;
      background: none;
    }
    .nav-group-btn.active { color: #e8a87c; }

    /* sub-tab items shown inline in the dropdown */
    .nav-btn {
      display: none; /* hidden by default — shown via JS per group */
      padding: 0.65rem 1.25rem 0.65rem 1.75rem;
      border: none;
      border-left: 3px solid transparent;
      text-align: left;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.65);
      white-space: normal;
    }
    .nav-btn.mobile-visible { display: block; }
    .nav-btn.active {
      color: #fff;
      border-left-color: #e8a87c;
      background: rgba(255,255,255,0.06);
      border-bottom-color: transparent;
    }

    /* divider handled above */

    .nav-row1 { position: relative; }
  }

  /* ── pages ── */
  .page { display: none; padding: 1.5rem 1.25rem 4rem; }
  .page.active { display: block; }

  .inner {
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── page header ── */
  .page-head {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 0.85rem;
    margin-bottom: 1.75rem;
  }
  .page-head h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }
  .page-head h1 span { color: var(--accent); font-style: italic; }

  .word-count {
    font-size: 0.82rem;
    color: var(--ink-muted);
    font-weight: 300;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── flashcard controls ── */
  .controls {
    margin-bottom: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .search-row {
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.95rem;
    padding: 0.55rem 0.9rem;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: 0;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  input[type="text"]::placeholder { color: var(--ink-faint); }
  input[type="text"]:focus { border-color: var(--ink); }

  .btn-shuffle {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.55rem 1rem;
    background: var(--ink);
    color: var(--surface);
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-shuffle:hover { background: var(--accent); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .filter-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    padding: 0.25rem 0.75rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    line-height: 1.6;
  }
  .filter-btn:hover { border-color: var(--ink-muted); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }

  .hint {
    font-size: 0.78rem;
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: 1rem;
  }

  /* ── card grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }

  .card-wrapper {
    perspective: 900px;
    height: 175px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s;
  }

  .card-wrapper:hover .card-face {
    box-shadow: 6px 8px 0px #c0b090;
  }

  .card-front {
    background: var(--surface);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }

  .thai-word {
    font-family: 'Sarabun', sans-serif;
    font-size: 1.75rem;
    font-weight: 300;
    color: var(--ink);
    text-align: center;
    line-height: 1.3;
  }

  .thai {
    font-size: 2rem;
    font-weight: 300;
    color: var(--ink);
    text-align: center;
    line-height: 1.2;
  }

  .topic-dot {
    position: absolute;
    top: 0.6rem;
    right: 0.7rem;
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .flip-hint {
    position: absolute;
    bottom: 0.6rem;
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .back-english {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--card-back-text);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }

  .back-rom {
    font-size: 0.8rem;
    color: var(--card-back-muted);
    font-style: italic;
    text-align: center;
    line-height: 1.4;
  }

  .back-topic {
    position: absolute;
    bottom: 0.6rem;
    font-size: 0.7rem;
    color: var(--card-back-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-faint);
    padding: 3rem;
    font-style: italic;
  }

  .tag-grammar { background: #d4eeeb; color: #1a5a52; }

  .topic-colors {
    --c-grammar: #2a7a6e;
    --c-disability: #6a4a9a;
    --c-funeral: #9b8ec4;
    --c-family: #5db89e;
    --c-beliefs: #d4923a;
    --c-food: #6ba85c;
    --c-military: #c46b5a;
    --c-city: #5a8fc4;
    --c-time: #888780;
    --c-society: #c45a8a;
    --c-health: #c44a4a;
    --c-wildlife: #7a6e5e;
    --c-transport: #3a7ab8;
    --c-water: #3aab88;
    --c-finance: #c4932a;
    --c-electricity: #c45050;
    --c-commerce: #b85a90;
    --c-labor: #5a9a3a;
  }

  .star-btn {
    position: absolute;
    top: 0.45rem;
    left: 0.5rem;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.15rem;
    color: var(--ink-faint);
    transition: color 0.15s, transform 0.15s;
    z-index: 2;
  }
  .star-btn:hover { color: #e8a030; transform: scale(1.2); }
  .star-btn.starred { color: #e8a030; }

  .my-list-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.75rem;
    border: 1px solid #e8a030;
    background: var(--surface);
    color: #7a5000;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    line-height: 1.6;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .my-list-btn.active { background: #e8a030; color: #fff; border-color: #e8a030; }
  .my-list-btn:hover { border-color: #c07800; }

  .starred-count {
    display: inline-block;
    background: #e8a030;
    color: #fff;
    border-radius: 999px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0 5px;
    min-width: 1.1rem;
    text-align: center;
    line-height: 1.4;
  }
  .my-list-btn.active .starred-count { background: rgba(255,255,255,0.35); color: #fff; }

  .study-mode-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.75rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    line-height: 1.6;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .study-mode-btn:hover { border-color: var(--ink-muted); color: var(--ink); }

  @media (max-width: 600px) {
    .page { padding: 1.1rem 0.85rem 3rem; }

    .page-head h1 { font-size: 1.5rem; }
    .word-count { font-size: 0.75rem; }

    .grid {
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.75rem;
    }
    .card-wrapper { height: 165px; }
    .thai { font-size: 1.8rem; }
    .back-english { font-size: 0.95rem; }

    .btn-shuffle { padding: 0.55rem 0.75rem; font-size: 0.75rem; }
    .filter-btn { font-size: 0.72rem; padding: 0.2rem 0.6rem; }
  }

  /* ── card example sentence ── */
  .back-ex {
    font-size: 0.75rem;
    color: var(--card-back-muted);
    text-align: center;
    line-height: 1.45;
    margin-top: 0.35rem;
    font-style: italic;
    padding: 0 0.5rem;
  }

  /* ── STUDY MODE MODAL ── */
  .study-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 600;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .study-modal-overlay.active { display: flex; }

  .study-modal {
    background: var(--surface);
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .study-modal-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .study-modal-counter {
    font-size: 0.78rem;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .study-modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.4rem; color: var(--ink-muted);
    line-height: 1; padding: 0.1rem 0.3rem;
    transition: color 0.15s;
  }
  .study-modal-close:hover { color: var(--accent); }

  .study-card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem;
    min-height: 340px;
    cursor: pointer;
    position: relative;
  }

  /* the flip card inside the modal */
  .study-card-wrapper {
    perspective: 1000px;
    width: 100%;
    height: 100%;
    min-height: 320px;
  }
  .study-card-inner {
    width: 100%;
    height: 100%;
    min-height: 320px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(0.4,0,0.2,1);
  }
  .study-card-wrapper.flipped .study-card-inner {
    transform: rotateY(180deg);
  }
  .study-card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    border: 1.5px solid var(--border);
    gap: 0.5rem;
  }
  .study-card-front { background: var(--surface); }
  .study-card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }

  .study-thai {
    font-size: 4rem;
    font-weight: 300;
    color: var(--ink);
    text-align: center;
    line-height: 1.15;
  }
  .study-topic-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    position: absolute;
    top: 0.8rem; right: 0.8rem;
  }
  .study-flip-hint {
    font-size: 0.72rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    position: absolute;
    bottom: 0.8rem;
  }
  .study-back-en {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--card-back-text);
    text-align: center;
    line-height: 1.3;
  }
  .study-back-rom {
    font-size: 0.9rem;
    color: var(--card-back-muted);
    font-style: italic;
    text-align: center;
  }
  .study-back-ex {
    font-size: 0.82rem;
    color: var(--card-back-muted);
    text-align: center;
    line-height: 1.5;
    font-style: italic;
    padding: 0 0.5rem;
    margin-top: 0.25rem;
  }
  .study-back-topic {
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: absolute;
    bottom: 0.8rem;
  }

  .study-modal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    gap: 0.5rem;
  }
  .study-nav-btn {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-size: 1.4rem;
    width: 3rem; height: 3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .study-nav-btn:hover { background: var(--bg); border-color: var(--ink-muted); }
  .study-star-modal {
    background: none; border: none;
    font-size: 1.6rem; cursor: pointer;
    color: var(--ink-faint);
    transition: color 0.15s, transform 0.15s;
  }
  .study-star-modal:hover { transform: scale(1.15); }
  .study-star-modal.starred { color: #e8a030; }

  @media (max-width: 600px) {
    .study-modal-overlay { padding: 0; }
    .study-modal { max-width: 100%; max-height: 100%; height: 100%; border-radius: 0; }
    .study-card-area { min-height: 0; flex: 1; }
    .study-card-wrapper, .study-card-inner { min-height: 0; height: 100%; }
    .study-thai { font-size: 3rem; }
    .study-back-en { font-size: 2rem; }
    .study-back-rom { font-size: 1.5rem; }
    .study-back-ex  { font-size: 1.3rem; }
  }
</style>
</head>
<body class="topic-colors">

<nav>
  <div class="nav-row1">
    <span class="nav-brand">Thai <span>Study</span></span>
    <div class="nav-groups" id="navGroups">
      <button class="nav-group-btn active" id="navg-study" onclick="switchGroup('study')">Study</button>
      <button class="nav-btn mobile-visible active" id="nav-cards" data-group="study" onclick="showPage('cards')">Flashcards</button>
      <div class="nav-group-divider"></div>
      <button class="nav-group-btn" id="navg-reference" onclick="switchGroup('reference')">Reference</button>
    </div>
    <button class="nav-hamburger" id="navHamburger" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-row2" id="navRow2">
    <button class="nav-btn active" id="nav-cards-d" data-group="study" onclick="showPage('cards')">Flashcards</button>
  </div>
</nav>

<div class="page active" id="page-cards">
<div class="inner">

<div class="page-head">
  <h1>Thai <span>Flashcards</span></h1>
  <span class="word-count" id="wordCount">0 words</span>
</div>

<div class="controls">
  <div class="search-row">
    <input type="text" id="search" placeholder="Search Thai, pronunciation, or English…" oninput="render()">
    <button class="btn-shuffle" onclick="shuffle()">Shuffle</button>
  </div>
  <div class="filters" id="filters"></div>
  <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.1rem;">
    <button class="my-list-btn" id="myListBtn" onclick="toggleMyList()">
      ★ My List <span class="starred-count" id="starredCount">0</span>
    </button>
    <button class="study-mode-btn" onclick="openStudyMode()">▶ Study Mode</button>
  </div>
</div>

<p class="hint">Tap any card to reveal translation & pronunciation</p>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- ── THEME TOGGLE ── -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>

<!-- ── STUDY MODE MODAL ── -->
<div class="study-modal-overlay" id="studyModalOverlay" onclick="closeStudyModeOnOverlay(event)">
  <div class="study-modal">
    <div class="study-modal-top">
      <span class="study-modal-counter" id="studyModalCounter">1 / 0</span>
      <button class="study-modal-close" onclick="closeStudyMode()">✕</button>
    </div>
    <div class="study-card-area" onclick="flipStudyCard()">
      <div class="study-card-wrapper" id="studyCardWrapper">
        <div class="study-card-inner" id="studyCardInner">
          <div class="study-card-face study-card-front">
            <div class="study-topic-dot" id="studyTopicDot"></div>
            <div class="study-thai" id="studyThai"></div>
            <div class="study-flip-hint">tap to reveal</div>
          </div>
          <div class="study-card-face study-card-back">
            <div class="study-back-en" id="studyBackEn"></div>
            <div class="study-back-rom" id="studyBackRom"></div>
            <div class="study-back-ex" id="studyBackEx"></div>
            <div class="study-back-topic" id="studyBackTopic"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="study-modal-nav">
      <button class="study-nav-btn" onclick="studyNav(-1)" title="Previous">←</button>
      <button class="study-star-modal" id="studyStarBtn" onclick="studyToggleStar()">☆</button>
      <button class="study-nav-btn" onclick="studyNav(1)" title="Next">→</button>
    </div>
  </div>
</div>

<script>
const topics = {
  grammar: { label: "ไวยากรณ์", color: "var(--c-grammar)" },
  funeral: { label: "งานศพ", color: "var(--c-funeral)" },
  family: { label: "ครอบครัว", color: "var(--c-family)" },
  beliefs: { label: "ความเชื่อ", color: "var(--c-beliefs)" },
  food: { label: "อาหาร", color: "var(--c-food)" },
  military: { label: "ทหาร", color: "var(--c-military)" },
  city: { label: "เมือง", color: "var(--c-city)" },
  time: { label: "เวลา", color: "var(--c-time)" },
  society: { label: "สังคม", color: "var(--c-society)" },
  health: { label: "สุขภาพ", color: "var(--c-health)" },
  wildlife: { label: "สัตว์", color: "var(--c-wildlife)" },
  transport: { label: "รถไฟ", color: "var(--c-transport)" },
  water: { label: "น้ำดื่ม", color: "var(--c-water)" },
  finance: { label: "การเงิน", color: "var(--c-finance)" },
  electricity: { label: "ไฟฟ้า", color: "var(--c-electricity)" },
  commerce: { label: "ค้าออนไลน์", color: "var(--c-commerce)" },
  labor: { label: "แรงงาน", color: "var(--c-labor)" },
  disability: { label: "สิทธิผู้พิการ", color: "var(--c-disability)" },
};

const allVocab = [{thai:"เสียชีวิต",rom:"sia chi wit",en:"to die, pass away",topic:"funeral",ex:"เมื่อมีคนเสียชีวิต ญาติต้องแจ้งเจ้าหน้าที่"},{thai:"ญาติพี่น้อง",rom:"yat phi nong",en:"relatives, family members",topic:"funeral",ex:"ญาติพี่น้องมาร่วมงานศพกันมาก"},{thai:"แจ้ง",rom:"jaeng",en:"to report, notify",topic:"funeral",ex:"ต้องแจ้งเจ้าหน้าที่ภายใน 24 ชั่วโมง"},{thai:"ครอบครัว",rom:"khrob khruea",en:"family",topic:"family",ex:"ครอบครัวคนไทยมักมีสมาชิกหลายรุ่นอยู่ด้วยกัน"},{thai:"ความเชื่อ",rom:"khwam chuea",en:"belief",topic:"beliefs",ex:"คนไทยมีความเชื่อหลายอย่างที่ส่งต่อกันมา"},{thai:"กรรม",rom:"gam",en:"karma",topic:"beliefs",ex:"ชาตินี้จะเป็นอย่างไรขึ้นอยู่กับกรรมที่ทำไว้"},{thai:"อาหารตามสั่ง",rom:"ahan tam sang",en:"made-to-order food",topic:"food",ex:"ร้านอาหารตามสั่งหาได้ทุกที่ตั้งแต่เช้าจนดึก"},{thai:"ผัดไทย",rom:"phat thai",en:"pad thai (stir-fried noodle dish)",topic:"food",ex:"ผัดไทยเป็นอาหารที่มีชื่อเสียงที่สุดของประเทศไทย"},{thai:"ทหาร",rom:"tha han",en:"soldier, military",topic:"military",ex:"ในประเทศไทยเราไม่ค่อยเห็นทหารผู้หญิง"},{thai:"เกณฑ์ทหาร",rom:"gen tha han",en:"military conscription",topic:"military",ex:"การเกณฑ์ทหารจัดขึ้นทุกปีในเดือนเมษายน"},{thai:"ซอยตัน",rom:"soi tan",en:"dead-end alley",topic:"city",ex:"ซอยนี้เป็นซอยตัน รถต้องถอยหลังออกไปเท่านั้น"},{thai:"รถไฟฟ้า",rom:"rot fai fa",en:"electric train, BTS Skytrain",topic:"city",ex:"มีสถานีรถไฟฟ้าใหม่เกิดขึ้นหน้าซอยลาดพร้าวแปดสิบสี่"},{thai:"เวลามาตรฐาน",rom:"we la mat tra than",en:"standard time",topic:"time",ex:"ประเทศไทยใช้เวลามาตรฐานเจ็ดชั่วโมงก่อนกรีนิช"},{thai:"สูบบุหรี่",rom:"sup bu ri",en:"to smoke (cigarettes)",topic:"society",ex:"กฎหมายห้ามสูบบุหรี่ในสถานที่สาธารณะทุกแห่ง"},{thai:"บัตรเอทีเอ็ม",rom:"bat e thi em",en:"ATM card",topic:"society",ex:"ถ้ากดรหัสผิดเกินสามครั้ง ตู้จะดูดบัตรเอทีเอ็มเข้าไป"},{thai:"ปั๊มน้ำมัน",rom:"pam nam man",en:"gas station, petrol station",topic:"society",ex:"ปั๊มน้ำมันในไทยมีร้านอาหารและร้านกาแฟอยู่ด้วย"},{thai:"มลพิษ",rom:"mon la phit",en:"pollution",topic:"health",ex:"มลพิษทางอากาศในภาคเหนือรุนแรงมากในช่วงฤดูแล้ง"},{thai:"หมอกควัน",rom:"mok khwan",en:"smog, haze",topic:"health",ex:"หมอกควันพิษทำให้คนในเมืองหายใจไม่ออก"},{thai:"สัตว์รบกวน",rom:"sat rob kuan",en:"pest, nuisance animal",topic:"wildlife",ex:"ยุงและแมลงวันเป็นสัตว์รบกวนที่พบมากในเมือง"},{thai:"งู",rom:"ngu",en:"snake",topic:"wildlife",ex:"เวลาน้ำท่วม งูชอบหนีเข้ามาอยู่ในบ้าน"},{thai:"รถไฟ",rom:"rot fai",en:"train",topic:"transport",ex:"รถไฟไทยเปิดให้บริการมาร้อยกว่าปีแล้ว"},{thai:"น้ำดื่ม",rom:"nam dueam",en:"drinking water",topic:"water",ex:"แนะนำให้ดื่มน้ำดื่มอย่างน้อยวันละสองลิตร"},{thai:"โรงจำนำ",rom:"rong cham nam",en:"pawnshop",topic:"finance",ex:"โรงจำนำเป็นทางเลือกในยามที่หาเงินจากที่ไหนไม่ได้แล้ว"},{thai:"มิเตอร์ไฟฟ้า",rom:"mi toe fai fa",en:"electricity meter",topic:"electricity",ex:"เจ้าหน้าที่มาตรวจมิเตอร์ไฟฟ้าหน้าบ้านทุกเดือน"},{thai:"ขายของออนไลน์",rom:"khai khong on lai",en:"to sell things online",topic:"commerce",ex:"เธอเริ่มขายของออนไลน์ตั้งแต่เรียนปีสอง"},{thai:"แรงงานต่างด้าว",rom:"raeng ngan tang dao",en:"foreign / migrant worker",topic:"labor",ex:"ประเทศไทยรับแรงงานต่างด้าวจากประเทศเพื่อนบ้านมากขึ้น"},{thai:"คนพิการ",rom:"khon phi kan",en:"disabled person",topic:"disability",ex:"คนพิการควรได้รับสิทธิเท่ากับคนธรรมดา"}];

let currentVocab = [...allVocab];
let activeFilter = "all";
let starred = new Set(JSON.parse(localStorage.getItem('thai-study-starred') || '[]'));
let showingMyList = false;
let studyDeck = [];
let studyIndex = 0;

function saveStarred() {
  localStorage.setItem('thai-study-starred', JSON.stringify([...starred]));
  updateStarCount();
}

function updateStarCount() {
  document.getElementById('starredCount').textContent = starred.size;
  document.querySelectorAll('.star-btn').forEach(btn => {
    const thai = btn.dataset.thai;
    const on = starred.has(thai);
    btn.classList.toggle('starred', on);
    btn.textContent = on ? '★' : '☆';
  });
}

function toggleStar(e, thai) {
  e.stopPropagation();
  if (starred.has(thai)) { starred.delete(thai); } else { starred.add(thai); }
  saveStarred();
  if (showingMyList) render();
}

function toggleMyList() {
  showingMyList = !showingMyList;
  document.getElementById('myListBtn').classList.toggle('active', showingMyList);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (!showingMyList) {
    document.querySelector(`.filter-btn[data-topic="${activeFilter}"]`)?.classList.add('active');
  }
  render();
}

function buildFilters() {
  const el = document.getElementById("filters");
  const btns = [`<button class="filter-btn active" data-topic="all" onclick="setFilter('all')">All</button>`];
  for (const [k, v] of Object.entries(topics)) {
    btns.push(`<button class="filter-btn" data-topic="${k}" onclick="setFilter('${k}')" style="border-left: 3px solid ${v.color}">${v.label}</button>`);
  }
  el.innerHTML = btns.join("");
}

function setFilter(topic) {
  activeFilter = topic;
  showingMyList = false;
  document.getElementById('myListBtn').classList.remove('active');
  document.querySelectorAll(".filter-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.topic === topic)
  );
  render();
}

function shuffle() {
  const q = document.getElementById("search").value.toLowerCase();
  let base = showingMyList
    ? allVocab.filter(v => starred.has(v.thai))
    : (activeFilter === "all" ? allVocab : allVocab.filter(v => v.topic === activeFilter));
  const filtered = q ? base.filter(v => v.thai.includes(q) || v.rom.toLowerCase().includes(q) || v.en.toLowerCase().includes(q)) : base;
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentVocab = filtered;
  renderCards(currentVocab);
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  let base = showingMyList
    ? allVocab.filter(v => starred.has(v.thai))
    : (activeFilter === "all" ? allVocab : allVocab.filter(v => v.topic === activeFilter));
  const filtered = q ? base.filter(v => v.thai.includes(q) || v.rom.toLowerCase().includes(q) || v.en.toLowerCase().includes(q)) : base;
  currentVocab = filtered;
  renderCards(filtered);
}

function renderCards(list) {
  document.getElementById("wordCount").textContent = list.length + " word" + (list.length !== 1 ? "s" : "");
  const grid = document.getElementById("grid");
  if (!list.length) {
    const msg = showingMyList ? 'No starred words yet — tap ☆ on any card to save it here.' : 'No words match your search.';
    grid.innerHTML = `<p class="empty">${msg}</p>`;
    return;
  }
  grid.innerHTML = list.map((v) => {
    const color = topics[v.topic]?.color || 'transparent';
    const label = topics[v.topic]?.label || '';
    const exLine = v.ex ? `<p class="back-ex">${v.ex}</p>` : '';
    const isStarred = starred.has(v.thai);
    const thaiEsc = v.thai.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="card-wrapper" onclick="this.classList.toggle('flipped')" title="Click to flip">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="topic-dot" style="background:${color}"></div>
          <button class="star-btn${isStarred?' starred':''}" data-thai="${v.thai}" onclick="toggleStar(event,'${thaiEsc}')">${isStarred?'★':'☆'}</button>
          <span class="thai">${v.thai}</span>
          <span class="flip-hint">tap to reveal</span>
        </div>
        <div class="card-face card-back">
          <p class="back-english">${v.en}</p>
          <p class="back-rom">${v.rom}</p>
          ${exLine}
          <span class="back-topic" style="color:${color}">${label}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleNav() {
  const groups = document.getElementById('navGroups');
  const btn = document.getElementById('navHamburger');
  groups.classList.toggle('open');
  btn.classList.toggle('open');
}

function switchGroup(group) {
  document.querySelectorAll('.nav-group-btn').forEach(b =>
    b.classList.toggle('active', b.id === 'navg-' + group)
  );
  document.getElementById('navGroups').classList.remove('open');
  document.getElementById('navHamburger').classList.remove('open');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

function openStudyMode() {
  studyDeck = [...currentVocab].sort(() => Math.random() - 0.5);
  studyIndex = 0;
  document.getElementById('studyModalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  renderStudyCard();
}

function closeStudyMode() {
  document.getElementById('studyModalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeStudyModeOnOverlay(e) {
  if (e.target === document.getElementById('studyModalOverlay')) closeStudyMode();
}

function renderStudyCard() {
  if (!studyDeck.length) return;
  const v = studyDeck[studyIndex];
  document.getElementById('studyCardWrapper').classList.remove('flipped');
  document.getElementById('studyThai').textContent = v.thai;
  document.getElementById('studyTopicDot').style.background = topics[v.topic]?.color || 'transparent';
  document.getElementById('studyBackEn').textContent = v.en;
  document.getElementById('studyBackRom').textContent = v.rom;
  document.getElementById('studyBackEx').textContent = v.ex || '';
  document.getElementById('studyBackTopic').textContent = topics[v.topic]?.label || '';
  document.getElementById('studyBackTopic').style.color = topics[v.topic]?.color || 'inherit';
  const starBtn = document.getElementById('studyStarBtn');
  const isStarred = starred.has(v.thai);
  starBtn.textContent = isStarred ? '★' : '☆';
  starBtn.classList.toggle('starred', isStarred);
  document.getElementById('studyModalCounter').textContent = `${studyIndex + 1} / ${studyDeck.length}`;
}

function flipStudyCard() {
  document.getElementById('studyCardWrapper').classList.toggle('flipped');
}

function studyNav(dir) {
  studyIndex = (studyIndex + dir + studyDeck.length) % studyDeck.length;
  renderStudyCard();
}

function studyToggleStar() {
  const v = studyDeck[studyIndex];
  if (starred.has(v.thai)) { starred.delete(v.thai); } else { starred.add(v.thai); }
  saveStarred();
  const isStarred = starred.has(v.thai);
  const starBtn = document.getElementById('studyStarBtn');
  starBtn.textContent = isStarred ? '★' : '☆';
  starBtn.classList.toggle('starred', isStarred);
}

/* ── DARK MODE ── */
(function() {
  const saved = localStorage.getItem('thai-study-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  if (dark) { document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themeToggle').textContent = '☀️'; }
})();

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('thai-study-theme', isDark ? 'light' : 'dark');
}

/* Keyboard support */
document.addEventListener('keydown', e => {
  if (!document.getElementById('studyModalOverlay').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') studyNav(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') studyNav(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipStudyCard(); }
  else if (e.key === 'Escape') closeStudyMode();
});

/* Initialize */
buildFilters();
render();
</script>
</body>
</html>
