<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Amber glow top-left -->
  <ellipse cx="200" cy="180" rx="320" ry="220" fill="url(#glow)"/>

  <!-- Decorative Thai letters background -->
  <text x="820" y="520" font-family="'Sarabun','Noto Sans Thai',sans-serif" font-size="380" font-weight="700" fill="#fbbf24" opacity="0.06">ก</text>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" rx="3" fill="#fbbf24" opacity="0.8"/>

  <!-- App icon -->
  <rect x="100" y="195" width="80" height="80" rx="18" fill="#fbbf24"/>
  <text x="140" y="261" text-anchor="middle" font-family="'Sarabun','Noto Sans Thai',sans-serif" font-size="52" font-weight="700" fill="#18181b">ก</text>

  <!-- Main title -->
  <text x="100" y="342" font-family="Georgia,'DM Serif Display',serif" font-size="72" font-weight="400" fill="#ffffff">Thai Study</text>

  <!-- Tagline -->
  <text x="100" y="398" font-family="Georgia,'DM Serif Display',serif" font-size="36" font-weight="400" fill="#fbbf24" font-style="italic">Learn Thai, word by word.</text>

  <!-- Feature pills -->
  <rect x="100" y="430" width="168" height="36" rx="18" fill="#ffffff" opacity="0.08"/>
  <text x="184" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="1">FLASHCARDS</text>

  <rect x="282" y="430" width="148" height="36" rx="18" fill="#ffffff" opacity="0.08"/>
  <text x="356" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="1">GRAMMAR</text>

  <rect x="444" y="430" width="148" height="36" rx="18" fill="#ffffff" opacity="0.08"/>
  <text x="518" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="1">QUIZZES</text>

  <rect x="606" y="430" width="128" height="36" rx="18" fill="#ffffff" opacity="0.08"/>
  <text x="670" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="1">FREE</text>

  <!-- URL -->
  <text x="100" y="550" font-family="Arial,sans-serif" font-size="22" fill="#ffffff" opacity="0.35" letter-spacing="1">thai-study.com</text>
</svg>
